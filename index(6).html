const el=(tag,props={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="htmlFor")e.htmlFor=v;
    else e.setAttribute(k,v);
  });
  const processChild = (child) => {
    if(child==null) return;
    if(Array.isArray(child)){
      child.forEach(c => processChild(c));
    } else {
      e.appendChild(typeof child==="string"?document.createTextNode(child):child);
    }
  };
  if(Array.isArray(children)){
    children.forEach(c => processChild(c));
  } else {
    processChild(children);
  }
  return e;
};

const svgEl=(tag,attrs={})=>{
  const e=document.createElementNS("http://www.w3.org/2000/svg",tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
};

const sbPost=async(t,d)=>{const r=await fetch(`${SB.url}/rest/v1/${t}`,{method:"POST",headers:sbH(),body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();};
const sbPatch=async(t,qs,d)=>{const r=await fetch(`${SB.url}/rest/v1/${t}${qs}`,{method:"PATCH",headers:sbH(),body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();};
const sbDel=async(t,qs)=>{const r=await fetch(`${SB.url}/rest/v1/${t}${qs}`,{method:"DELETE",headers:{...sbH(),"Prefer":""}});return r.ok;};

async function fetchAll(){
  S.syncing=true;render();
  try{
    const[tx,bud,deb,goa,sett]=await Promise.all([
      sbGet("transactions","?order=date.desc"),
      sbGet("budgets"),
      sbGet("debts","?order=created_at.desc"),
      sbGet("goals","?order=created_at.asc"),
      sbGet("app_settings"),
    ]);
    S.txList=Array.isArray(tx)?tx:[];
    S.budgets=Array.isArray(bud)?bud:[];
    S.debts=Array.isArray(deb)?deb:[];
    S.goals=Array.isArray(goa)?goa:[];
    const ps=sett?.find?.(s=>s.key==="persons");
    if(ps)S.persons=JSON.parse(ps.value);
    S.lastSync=new Date();
  }catch(e){console.error(e);showToast("⚠️ Error de conexión","err");}
  S.syncing=false;render();
}

async function savePersons(p){
  S.persons=p;render();
  try{
    const ex=await sbGet("app_settings","?key=eq.persons");
    if(ex?.length>0)await sbPatch("app_settings","?key=eq.persons",{value:JSON.stringify(p)});
    else await sbPost("app_settings",{key:"persons",value:JSON.stringify(p)});
  }catch(e){}
}

async function submitTx(){
  const f=S.form;
  if(!f.amount||!f.date||!f.cat_id){showToast("❌ Completa todos los campos","err");return;}
  const t={id:Date.now().toString(),type:f.type,amount:parseFloat(f.amount),date:f.date,cat_id:f.cat_id,sub_cat:f.sub_cat||"",note:f.note||"",person_id:f.person_id||"0",goal_id:f.goal_id||null};
  try{
    await sbPost("transactions",t);
    if(t.type==="savings"&&t.goal_id){
      const g=S.goals.find(g=>g.id===t.goal_id);
      if(g)await sbPatch("goals",`?id=eq.${g.id}`,{current:g.current+t.amount});
    }
    await fetchAll();S.modal=null;S.form={type:"expense",date:hoy(),person_id:"0",amount:"",cat_id:"",sub_cat:"",note:""};showToast("✅ Guardado");
  }catch(e){showToast("❌ Error al guardar","err");}
}

async function submitDebt(){
  const f=S.form;if(!f.name||!f.amount){showToast("❌ Completa los campos","err");return;}
  try{
    await sbPost("debts",{id:Date.now().toString(),name:f.name,amount:parseFloat(f.amount),creditor:f.creditor||"",due_date:f.dueDate||null,note:f.note||"",paid:false});
    await fetchAll();S.modal=null;S.form={};showToast("✅ Adeudo guardado");
  }catch(e){showToast("❌ Error","err");}
}

async function submitGoal(){
  const f=S.form;if(!f.name||!f.target){showToast("❌ Completa los campos","err");return;}
  try{
    await sbPost("goals",{id:Date.now().toString(),name:f.name,target:parseFloat(f.target),current:0,color:PAL[S.goals.length%PAL.length]});
    await fetchAll();S.modal=null;S.form={};showToast("✅ Meta creada");
  }catch(e){showToast("❌ Error","err");}
}

async function deleteTx(id){try{await sbDel("transactions",`?id=eq.${id}`);await fetchAll();showToast("🗑️ Eliminado","err");}catch(e){}}
async function toggleDebt(d){try{await sbPatch("debts",`?id=eq.${d.id}`,{paid:!d.paid});await fetchAll();showToast(d.paid?"✅ Marcado como pendiente":"✅ ¡Pagado!");}catch(e){}}
async function deleteDebt(id){try{await sbDel("debts",`?id=eq.${id}`);await fetchAll();showToast("🗑️ Eliminado","err");}catch(e){}}
async function addToGoal(id,amt){
  const g=S.goals.find(g=>g.id===id);if(!g)return;
  try{await sbPatch("goals",`?id=eq.${id}`,{current:g.current+amt});await fetchAll();showToast("💰 Depósito guardado");}catch(e){}
}
async function setBudget(catId,amount){
  const val=parseFloat(amount)||0;
  const ex=S.budgets.find(b=>b.cat_id===catId&&b.month===S.month&&b.year===S.year);
  try{
    if(ex)await sbPatch("budgets",`?id=eq.${ex.id}`,{amount:val});
    else await sbPost("budgets",{id:`${catId}_${S.month}_${S.year}`,cat_id:catId,month:S.month,year:S.year,amount:val});
    await fetchAll();showToast("✅ Presupuesto actualizado");
  }catch(e){showToast("⚠️ Error","err");}
}

function getMTx(){return S.txList.filter(t=>{const d=new Date(t.date);return d.getMonth()===S.month&&d.getFullYear()===S.year;});}
function catSpend(mtx){const m={};mtx.filter(t=>t.type==="expense").forEach(t=>{m[t.cat_id]=(m[t.cat_id]||0)+t.amount;});return m;}
function getBudget(catId){return S.budgets.find(b=>b.cat_id===catId&&b.month===S.month&&b.year===S.year)?.amount||0;}

function monthNav(){
  const div=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}});
  const pb=el("button",{style:{background:C.card2,border:`1px solid ${C.border}`,color:C.text,borderRadius:"8px",padding:"6px 14px",cursor:"pointer",fontSize:"18px"},onClick:()=>{const d=new Date(S.year,S.month-1);S.month=d.getMonth();S.year=d.getFullYear();render();}},["‹"]);
  const nb=el("button",{style:{background:C.card2,border:`1px solid ${C.border}`,color:C.text,borderRadius:"8px",padding:"6px 14px",cursor:"pointer",fontSize:"18px"},onClick:()=>{const d=new Date(S.year,S.month+1);S.month=d.getMonth();S.year=d.getFullYear();render();}},["›"]);
  const title=el("div",{className:"syne",style:{fontWeight:"800",fontSize:"17px"}});
  title.textContent=`${MES[S.month]} ${S.year}`;
  div.appendChild(pb);div.appendChild(title);div.appendChild(nb);return div;
}

    const empty=el("div",{style:{textAlign:"center",padding:"40px",color:C.muted}});

    empty.appendChild(el("div",{style:{fontWeight:"600"}},["Sin movimientos"]));
    empty.appendChild(el("div",{style:{fontSize:"12px",marginTop:"4px"}},["Toca + para agregar"]));
    div.appendChild(empty);
  }
  
  mtx.forEach(tx=>{
    const cat=getCat(tx.type,tx.cat_id);

    const ci=el("div",{style:{flex:"1",minWidth:"0"}});
    const cn=el("div",{style:{fontSize:"13px",fontWeight:"600",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    cn.textContent=tx.sub_cat||cat?.label.replace(/^\S+\s/,"")||"—";ci.appendChild(cn);
    const cm=el("div",{style:{fontSize:"11px",color:C.muted}});
    let meta=[];
    if(isIn)meta.push(S.persons[parseInt(tx.person_id)||0]);
    if(tx.note)meta.push(tx.note);
    meta.push(new Date(tx.date).toLocaleDateString("es-MX",{day:"2-digit",month:"short"}));
    cm.textContent=meta.join(" · ");ci.appendChild(cm);card2.appendChild(ci);
    const cr=el("div",{style:{textAlign:"right",flexShrink:"0"}});
    const cv=el("div",{style:{fontWeight:"700",color,fontSize:"15px"}});cv.textContent=`${sign}${fmt(tx.amount)}`;cr.appendChild(cv);
    const del=el("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"15px",padding:"0"},onClick:()=>deleteTx(tx.id)},["🗑"]);
    cr.appendChild(del);card2.appendChild(cr);div.appendChild(card2);
  });
  return div;
}

function viewBudget(){
  const cs=catSpend(getMTx());
  const expense=Object.values(cs).reduce((s,v)=>s+v,0);
  const totalBud=CATS_GASTO.reduce((s,c)=>s+getBudget(c.id),0);
  const div=el("div",{className:"page"});
  div.appendChild(el("div",{className:"syne",style:{fontWeight:"800",fontSize:"20px",marginBottom:"2px"}},["🎯 Presupuesto"]));
  div.appendChild(el("div",{style:{fontSize:"12px",color:C.muted,marginBottom:"14px"}},[`${MES[S.month]} ${S.year}`]));
  
  if(totalBud>0){
    const hc=el("div",{className:"card",style:{background:"linear-gradient(135deg,#1a1a2e,#0d0d14)",borderColor:"#2a2a3a",display:"flex",justifyContent:"space-between",alignItems:"center"}});
    const hl=el("div");hl.appendChild(el("div",{style:{fontSize:"11px",color:C.muted}},["Presupuestado"]));
    const hv=el("div",{className:"syne",style:{fontSize:"22px",fontWeight:"800",color:C.indigo}});hv.textContent=fmt(totalBud);hl.appendChild(hv);
    const hr=el("div",{style:{textAlign:"right"}});hr.appendChild(el("div",{style:{fontSize:"11px",color:C.muted}},["Gastado"]));
    const gv=el("div",{style:{fontSize:"18px",fontWeight:"700",color:expense>totalBud?C.red:C.green}});gv.textContent=fmt(expense);hr.appendChild(gv);
    hc.appendChild(hl);hc.appendChild(hr);div.appendChild(hc);
  }
  
  CATS_GASTO.forEach((cat,i)=>{
    const spent=cs[cat.id]||0,budget=getBudget(cat.id),pct=budget>0?Math.min((spent/budget)*100,100):0,over=budget>0&&spent>budget;
    const bc=el("div",{className:"card",style:{marginBottom:"8px"}});
    const bt=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
    bt.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"600"}},[cat.label]));
    const bv=el("span",{style:{fontSize:"13px",fontWeight:"700",color:over?C.red:spent>0?C.text:C.muted}});
    bv.textContent=fmt(spent)+(budget>0?` / ${fmt(budget)}`:"");bt.appendChild(bv);bc.appendChild(bt);
    if(budget>0){
      const bar=el("div",{className:"bar-h",style:{marginBottom:over?"4px":"6px"}});
      bar.appendChild(el("div",{className:"bar-h-fill",style:{width:`${pct}%`,background:over?C.red:PAL[i%PAL.length]}}));
      bc.appendChild(bar);
    }
    if(over){const ov=el("div",{style:{fontSize:"11px",color:C.red,marginBottom:"4px"}});ov.textContent=`⚠️ Excedido en ${fmt(spent-budget)}`;bc.appendChild(ov);}
    const inp2=el("input",{type:"number",placeholder:"Presupuesto mensual...",className:"inp",style:{fontSize:"12px",padding:"7px 10px",marginTop:"4px",color:C.muted}});
    if(budget>0)inp2.value=budget;
    inp2.addEventListener("blur",e=>{if(e.target.value!=="")setBudget(cat.id,e.target.value);});
    bc.appendChild(inp2);div.appendChild(bc);
  });
  return div;
}

  const h=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}});
  const ht=el("div");ht.appendChild(el("div",{className:"syne",style:{fontWeight:"800",fontSize:"20px"}},["🏦 Ahorros"]));
  const hv=el("div",{style:{fontSize:"12px",color:C.muted}});hv.textContent=`${fmt(S.goals.reduce((s,g)=>s+g.current,0))} en metas`;ht.appendChild(hv);
  h.appendChild(ht);
  const nb=el("button",{className:"btn-amb",onClick:()=>{S.form={};S.modal="goal";render();}},["+ Meta"]);
  h.appendChild(nb);div.appendChild(h);
  
  const mc=el("div",{className:"card",style:{background:"linear-gradient(135deg,#1a1a2e,#0d0d14)",borderColor:"#2a2a3a"}});
  mc.appendChild(el("div",{className:"syne",style:{fontWeight:"700",fontSize:"13px",color:C.muted,marginBottom:"10px"}},["Ahorro este mes"]));
  const mr=el("div",{style:{display:"flex"}});
  [["Total",totalSav,C.indigo]].forEach(([l,v,c])=>{
    const col=el("div",{style:{flex:"1",textAlign:"center"}});
    col.appendChild(el("div",{style:{fontSize:"10px",color:C.muted}},[l]));
    const mv=el("div",{style:{fontSize:"24px",fontWeight:"800",color:c,marginTop:"3px"}});mv.textContent=fmt(v);col.appendChild(mv);mr.appendChild(col);
  });
  mc.appendChild(mr);div.appendChild(mc);
  
  if(S.goals.length===0){
    const e=el("div",{style:{textAlign:"center",padding:"40px",color:C.muted}});
    e.appendChild(el("div",{style:{fontSize:"40px",marginBottom:"8px"}},["🎯"]));
    e.appendChild(el("div",{style:{fontWeight:"600"}},["Sin metas de ahorro"]));
    div.appendChild(e);
  }
  
  S.goals.forEach(g=>{
    const pct=Math.min((g.current/g.target)*100,100);
    const gc=el("div",{className:"card",style:{borderLeft:`4px solid ${g.color}`,marginBottom:"12px"}});
    const gh=el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}});
    const gn=el("span",{style:{fontWeight:"700",fontSize:"16px"}});gn.textContent=g.name;
    const gp=el("span",{className:"syne",style:{fontWeight:"800",color:g.color,fontSize:"15px"}});gp.textContent=`${pct.toFixed(0)}%`;
    gh.appendChild(gn);gh.appendChild(gp);gc.appendChild(gh);
    const gm=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",color:C.muted,marginBottom:"8px"}});
    const ga=el("span");const gab=el("b",{style:{color:g.color}});gab.textContent=fmt(g.current);ga.appendChild(document.createTextNode("Ahorrado: "));ga.appendChild(gab);
    const gt=el("span");gt.textContent=`Meta: ${fmt(g.target)}`;gm.appendChild(ga);gm.appendChild(gt);gc.appendChild(gm);
    const bar=el("div",{style:{background:C.border,borderRadius:"6px",height:"10px",marginBottom:"8px",overflow:"hidden"}});
    const fill=el("div",{style:{background:`linear-gradient(90deg,${g.color}88,${g.color})`,borderRadius:"6px",height:"10px",width:`${pct}%`}});
    bar.appendChild(fill);gc.appendChild(bar);
    const gst=el("div",{style:{fontSize:"11px",color:pct<100?C.muted:g.color,fontWeight:pct<100?"400":"700",marginBottom:"10px"}});
    gst.textContent=pct<100?`Faltan ${fmt(g.target-g.current)} 🎯`:"🎉 ¡Meta alcanzada!";gc.appendChild(gst);
    const gr=el("div",{style:{display:"flex",gap:"8px"}});
    const gi=el("input",{type:"number",placeholder:"Depositar...",className:"inp",style:{fontSize:"13px",padding:"8px 10px",flex:"1"}});
    gi.value=S.savAmt[g.id]||"";
    gi.addEventListener("input",function(e){S.savAmt={...S.savAmt,[g.id]:e.target.value};render();});
    const gb=el("button",{className:"btn-amb",style:{padding:"8px 12px",whiteSpace:"nowrap"},onClick:function(){
      const a=parseFloat(S.savAmt[g.id]);
      if(a>0){addToGoal(g.id,a);S.savAmt={...S.savAmt,[g.id]:""};render();}
    }});
    gb.textContent="+ Dep.";
    gr.appendChild(gi);gr.appendChild(gb);gc.appendChild(gr);div.appendChild(gc);
  });
  return div;
}

// ═══════════════════════════════════════════════════════════════
// MODALES
// ═══════════════════════════════════════════════════════════════
function buildModal(){
  if(!S.modal)return null;
  const f=S.form;
  const bg=el("div",{className:"modal-bg",onClick:()=>{S.modal=null;render();}});
  const box=el("div",{className:"modal-box",onClick:e=>e.stopPropagation()});
  
  if(S.modal==="tx"){
    box.appendChild(el("div",{className:"syne",style:{fontWeight:"800",fontSize:"18px",marginBottom:"14px"}},["💳 Nuevo movimiento"]));
    const tabs=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"14px"}});
    [["expense","Gasto",C.red],["income","Ingreso",C.green],["savings","Ahorro",C.amber]].forEach(([t,l,c])=>{
      const b=el("button",{style:{background:f.type===t?c+"22":C.card2,border:`1px solid ${f.type===t?c:C.border}`,color:f.type===t?c:C.muted,borderRadius:"10px",padding:"9px",fontSize:"13px",fontWeight:"700",cursor:"pointer"},onClick:()=>{S.form={...S.form,type:t};render();}});
      b.textContent=l;tabs.appendChild(b);
    });
    box.appendChild(tabs);
    box.appendChild(el("label",{className:"lbl"},["Monto"]));
    const amtInp=el("input",{type:"number",placeholder:"$0.00",className:"inp",style:{fontSize:"24px",fontWeight:"800",marginBottom:"12px"}});
    if(f.amount)amtInp.value=f.amount;
    amtInp.addEventListener("input",e=>S.form={...S.form,amount:e.target.value});box.appendChild(amtInp);
    box.appendChild(el("label",{className:"lbl"},["Fecha"]));
    const di=el("input",{type:"date",className:"inp",style:{marginBottom:"12px"}});di.value=f.date||hoy();
    di.addEventListener("change",e=>S.form={...S.form,date:e.target.value});box.appendChild(di);
    
    if(f.type==="income"){
      box.appendChild(el("label",{className:"lbl"},["Persona"]));
      const ps=el("select",{className:"inp",style:{marginBottom:"12px"}});
      S.persons.forEach((p,i)=>{const o=el("option",{value:String(i)},[p]);if(f.person_id===String(i))o.selected=true;ps.appendChild(o);});
      ps.addEventListener("change",e=>S.form={...S.form,person_id:e.target.value});box.appendChild(ps);
    }
    
    const cats=f.type==="income"?CATS_INGRESO:f.type==="savings"?CATS_AHORRO:CATS_GASTO;
    box.appendChild(el("label",{className:"lbl"},["Categoría"]));
    const cs=el("select",{className:"inp",style:{marginBottom:"12px"}});
    cs.appendChild(el("option",{value:""},["Selecciona categoría..."]));
    cats.forEach(c=>{const o=el("option",{value:c.id},[c.label]);if(f.cat_id===c.id)o.selected=true;cs.appendChild(o);});
    cs.addEventListener("change",e=>S.form={...S.form,cat_id:e.target.value,sub_cat:""});box.appendChild(cs);
    
    const selCat=cats.find(c=>c.id===f.cat_id);
    if(selCat && selCat.subs){
      box.appendChild(el("label",{className:"lbl"},["Subcategoría"]));
      const ss=el("select",{className:"inp",style:{marginBottom:"12px"}});
      ss.appendChild(el("option",{value:""},["Selecciona..."]));
      selCat.subs.forEach(s=>{const o=el("option",{value:s},[s]);if(f.sub_cat===s)o.selected=true;ss.appendChild(o);});
      ss.addEventListener("change",e=>S.form={...S.form,sub_cat:e.target.value});box.appendChild(ss);
    }
    
    box.appendChild(el("label",{className:"lbl"},["Nota (opcional)"]));
    const ni=el("input",{type:"text",placeholder:"Descripción adicional...",className:"inp",style:{marginBottom:"16px"}});
    if(f.note)ni.value=f.note;ni.addEventListener("input",e=>S.form={...S.form,note:e.target.value});box.appendChild(ni);
    const sb=el("button",{className:"btn-ind",style:{width:"100%",padding:"14px",fontSize:"15px"},onClick:submitTx},["Guardar"]);
    box.appendChild(sb);
  }
  
  if(S.modal==="debt"){
    box.appendChild(el("div",{className:"syne",style:{fontWeight:"800",fontSize:"18px",marginBottom:"14px"}},["📋 Nuevo adeudo"]));
    const fields=[["name","text","Nombre del adeudo","Tarjeta, préstamo..."],["amount","number","Monto total","$0.00"],["creditor","text","A quién se debe","Banco, persona..."],["dueDate","date","Fecha de vencimiento (opcional)",""],["note","text","Notas","Pago mínimo, interés..."]];
    fields.forEach(([k,t,l,p])=>{
      box.appendChild(el("label",{className:"lbl"},[l]));
      const i=el("input",{type:t,placeholder:p,className:"inp",style:{marginBottom:"12px"}});
      if(f[k])i.value=f[k];i.addEventListener("input",e=>S.form={...S.form,[k]:e.target.value});box.appendChild(i);
    });
    const sb=el("button",{className:"btn-red",style:{width:"100%",padding:"14px",fontSize:"15px",marginTop:"4px"},onClick:submitDebt},["Guardar adeudo"]);
    box.appendChild(sb);
  }
  
  if(S.modal==="goal"){
    box.appendChild(el("div",{className:"syne",style:{fontWeight:"800",fontSize:"18px",marginBottom:"14px"}},["🏦 Nueva meta de ahorro"]));
    [["name","text","Nombre de la meta","Fondo de emergencia, Vacaciones..."],["target","number","Monto objetivo","$0.00"]].forEach(([k,t,l,p])=>{
      box.appendChild(el("label",{className:"lbl"},[l]));
      const i=el("input",{type:t,placeholder:p,className:"inp",style:{marginBottom:"12px"}});
      if(f[k])i.value=f[k];i.addEventListener("input",e=>S.form={...S.form,[k]:e.target.value});box.appendChild(i);
    });
    const sb=el("button",{className:"btn-amb",style:{width:"100%",padding:"14px",fontSize:"15px",marginTop:"4px"},onClick:submitGoal},["Crear meta 🎯"]);
    box.appendChild(sb);
  }
  
  bg.appendChild(box);return bg;
}

// ═══════════════════════════════════════════════════════════════
// CONSTRUCCIÓN DE LA APP
// ═══════════════════════════════════════════════════════════════
function buildApp(){
  const root=el("div");
  
  const header=el("div",{style:{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:"0",zIndex:"10"}});
  const logo=el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
  const lt=el("div",{className:"syne",style:{fontWeight:"800",fontSize:"22px",color:C.indigo,letterSpacing:"-1px"}});lt.textContent="🖤 ZRPro";
  logo.appendChild(lt);
  if(S.lastSync)logo.appendChild(el("div",{style:{fontSize:"10px",color:C.green}},["● live"]));
  else if(S.syncing)logo.appendChild(el("div",{style:{fontSize:"10px",color:C.muted}},["syncing…"]));
  header.appendChild(logo);
  const hbr=el("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
  const ref=el("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",padding:"0"},onClick:fetchAll},["⟳"]);
  const set=el("button",{style:{background:"none",border:"none",color:S.settings?C.indigo:C.muted,cursor:"pointer",fontSize:"18px",padding:"0"},onClick:()=>{S.settings=!S.settings;render();}},["⚙️"]);
  hbr.appendChild(ref);hbr.appendChild(set);header.appendChild(hbr);root.appendChild(header);
  
  if(S.settings){
    const sp=el("div",{className:"card",style:{margin:"10px 14px 0",borderColor:C.indigo+"44"}});
    sp.appendChild(el("div",{className:"syne",style:{fontWeight:"700",fontSize:"14px",marginBottom:"10px"}},["👥 Nombres de la pareja"]));
    S.persons.forEach((p,i)=>{
      const row=el("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"8px"}});
      const av=el("div",{style:{width:"28px",height:"28px",borderRadius:"50%",background:i===0?C.indigo+"33":C.green+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:"700",color:i===0?C.indigo:C.green}});
      av.textContent=p.slice(0,1);
      const inp2=el("input",{type:"text",className:"inp",style:{flex:"1"}});inp2.value=p;
      inp2.addEventListener("change",e=>{const n=[...S.persons];n[i]=e.target.value;savePersons(n);});
      row.appendChild(av);row.appendChild(inp2);sp.appendChild(row);
    });
    root.appendChild(sp);
  }
  
  let content;
  if(S.view==="dashboard") content=viewDashboard();
  else if(S.view==="transactions") content=viewTransactions();
  else if(S.view==="budget") content=viewBudget();
  else if(S.view==="debts") content=viewDebts();
  else if(S.view==="savings") content=viewSavings();
  root.appendChild(content);
  
  if(S.view==="dashboard"||S.view==="transactions"){
    const fab=el("button",{className:"fab",onClick:()=>{S.form={type:"expense",date:hoy(),person_id:"0",amount:"",cat_id:"",sub_cat:"",note:""};S.modal="tx";render();}},["+"]);
    root.appendChild(fab);
  }
  
  const nav=el("nav",{style:{position:"fixed",bottom:"0",left:"0",right:"0",background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:"10"}});
  [["dashboard","📊","Resumen"],["transactions","💳","Movimientos"],["budget","🎯","Presupuesto"],["debts","📋","Adeudos"],["savings","🏦","Ahorros"]].forEach(([id,icon,label])=>{
    const b=el("button",{className:`nav-btn${S.view===id?" active":""}`,onClick:()=>{S.view=id;render();}});
    b.appendChild(el("span",{style:{fontSize:"19px"}},[icon]));
    b.appendChild(el("span",{},[label]));nav.appendChild(b);
  });
  root.appendChild(nav);
  
  const modal=buildModal();
  if(modal)root.appendChild(modal);
  
  if(S.toast){
    const t=el("div",{className:"toast",style:{background:S.toast.type==="err"?C.red:C.green,color:"#0a0a0f"}});
    t.textContent=S.toast.msg;root.appendChild(t);
  }
  
  return root;
}

// ═══════════════════════════════════════════════════════════════
// INICIALIZACIÓN
// ═══════════════════════════════════════════════════════════════
async function init(){
  render=()=>{
    const rootDiv=document.getElementById("root");
    rootDiv.innerHTML="";
    rootDiv.appendChild(buildApp());
  };
  await fetchAll();
  render();
  setInterval(fetchAll,30000);
}

window.addEventListener("load",()=>{
  init();
});
</script>
</body>
</html>
